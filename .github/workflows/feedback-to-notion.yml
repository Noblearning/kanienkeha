name: Sync Feedback to Notion

on:
  schedule:
    - cron: '0 8 * * *'   # Runs daily at 8:00 AM UTC — adjust to taste
  workflow_dispatch:       # Also allows manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync new feedback issues to Notion
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const NOTION_TOKEN = process.env.NOTION_TOKEN;
            const NOTION_DATABASE_ID = process.env.NOTION_DATABASE_ID;

            // Maps the emoji-prefixed exercise type strings written by the app
            // into the canonical title-case Notion multi-select option names.
            // Create these exact names as options in your Notion "Exercise Type" column.
            const EXERCISE_TYPE_MAP = {
              '🌀 Multiple Choice':   'Multiple Choice',
              '🔗 Matching':          'Matching',
              '✏️ Fill in the Blank': 'Fill in the Blank',
              '⌨️ Type the Word':     'Type the Word',
              '🎙️ Speak Aloud':      'Speak Aloud',
              '🌱 Story Moment':      'Story Moment',
              '💬 Conversation':      'Conversation',
            };

            // ── 1. Fetch all open issues labelled 'user-report' but NOT 'synced-to-notion'
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'user-report',
              state: 'open',
              per_page: 100,
            });

            const unsynced = issues.filter(issue =>
              !issue.labels.some(l => l.name === 'synced-to-notion')
            );

            console.log(`Found ${unsynced.length} unsynced report(s).`);

            if (unsynced.length === 0) return;

            // ── 2. For each issue, create a Notion page in the database
            for (const issue of unsynced) {
              // Parse the structured body written by the app
              const body = issue.body || '';
              const get = (field) => {
                const match = body.match(new RegExp(`\\*\\*${field}:\\*\\*\\s*(.+)`));
                return match ? match[1].trim() : '';
              };

              const issueType  = get('Issue') || '—';
              const question   = get('Question') || '—';
              const exTypeRaw  = get('Exercise type');
              const reportedAt = get('Reported at');

              // Resolve exercise type label; fall back to raw value if unrecognised
              const exTypeLabel = EXERCISE_TYPE_MAP[exTypeRaw] || exTypeRaw || '—';

              // Notion date fields require { start: '<ISO 8601 string>' }.
              // Fall back to the issue creation timestamp if the field is missing.
              const dateValue = (reportedAt && !isNaN(Date.parse(reportedAt)))
                ? reportedAt
                : issue.created_at;

              const notionBody = {
                parent: { database_id: NOTION_DATABASE_ID },
                properties: {
                  // "Name" is the title column — required in every Notion DB
                  'Name': {
                    title: [{ text: { content: issueType } }]
                  },
                  'Question': {
                    rich_text: [{ text: { content: question } }]
                  },
                  // Multi-select — add all seven options listed above to this column in Notion
                  'Exercise Type': {
                    multi_select: [{ name: exTypeLabel }]
                  },
                  // Date type — value must be an ISO 8601 string
                  'Reported At': {
                    date: { start: dateValue }
                  },
                  'GitHub Issue': {
                    url: issue.html_url
                  },
                  'Status': {
                    select: { name: 'New' }
                  }
                }
              };

              const res = await fetch('https://api.notion.com/v1/pages', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${NOTION_TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify(notionBody),
              });

              if (!res.ok) {
                const err = await res.text();
                console.error(`Failed to create Notion page for issue #${issue.number}: ${err}`);
                continue;
              }

              console.log(`Created Notion page for issue #${issue.number}: ${issueType}`);

              // ── 3. Label the issue as synced so it isn't processed again tomorrow
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['synced-to-notion'],
              });
            }

            console.log('Sync complete.');
